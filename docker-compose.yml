services:
  app:
    build: .
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2g
    volumes:
      - lancedb_data:/app/data
    networks:
      - runreview_net

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - app
    networks:
      - runreview_net

volumes:
  lancedb_data:

networks:
  runreview_net:
